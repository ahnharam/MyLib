<!DOCTYPE html>
<html>
<head>
    <title>
        DOM
    </title>
    <script>
        window.onload = function(){
            var clock = document.getElementById('clock');

            setInterval(() => {
                var now = new Date();

                clock.innerHTML = now.toString();
            }, 1000);
        }
    </script>
</head>
    <body>
        <hi id="clock"></hi>
    </body>
</html>
