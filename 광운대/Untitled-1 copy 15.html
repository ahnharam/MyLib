<!DOCTYPE html>
<html>
    <header>
        <title>Absolute Position</title>
        <style>
            *{margin: 0; padding: 0;}
            .container{
                width: 1080px;
                margin-bottom: 8px;
                position: relative;
                left:50%;
                margin-left: -540px;

            }

            .gnb{
                float: left;
                width: 1080px;
                left: 0;
                padding: 8px 0px;

                li{
                    position: relative;
                    width: fit-content;
                    padding-left: 16px;
                    list-style-type: none;
                    background: green;
                    
                }
                li:first-child{
                    padding-left: 0;
                }
            }

            .rank{
                float: right;
                right: 0;
                padding-top: 8px;
                padding-bottom: 8px;
                li{
                    background: yellow;
                    list-style-type: none;
                }
            }

            .left{
                float: left;
                width: 740px;
                height: 428px;
                background: red;
            }

            .right{
                float: right;
                width: 332px;
                height: 428px;
                background: blue;
            }
            .footer{
                float: bottom;
                background: yellow;
                height: 80px;
            }
        </style>
    </header>
    <body>
        <div class="container">
            <h1>Logo</h1>
        </div>
        <div class="container">
            <ul class="gnb">
                <li>메일</li>
                <li>카페</li>
                <li>블로그</li>
                <li>쇼핑</li>
                <li>사전</li>
                <li>뉴스</li>
                <li>증권</li>
                <li>부동산</li>
                <li>지도</li>
            </ul>

                <ul class="rank">
                    <li>실시간 검색 순위</li>
                </ul>
        </div>
        <div class="container">
            <div class="left"></div>
            <div class="right"></div>
        </div>
        <div class="container">
            <div class="left"></div>
            <div class="right"></div>
        </div>
        <div class="container">
            <div class="footer"></div>
        </div>
    </body>
</html>
