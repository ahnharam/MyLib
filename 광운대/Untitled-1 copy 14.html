<!DOCTYPE html>
<html>
    <header>
        <title>Absolute Position</title>
        <style>
            .container{
                margin-top: 50px;
                margin-left: 50px;
            }

            .top_bar{
                background: red;
                position: fixed;
                left: 0;
                top: 0;
                right: 0;
                height: 50px;
            }

            .left_bar{
                background: blue;
                position: fixed;
                left: 0;
                top: 50px;
                bottom: 0;
                width: 50px;
            }
        </style>
    </header>
    <body>
        <div class="top_bar"></div>
        <div class="left_bar"></div>
        <div class="container">
            <p>요소배치</p>
            <p>요소배치</p>
            <p>요소배치</p>
            <p>요소배치</p>
            <p>요소배치</p>
        </div>
    </body>
</html>
